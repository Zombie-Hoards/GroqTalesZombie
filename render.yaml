# Render deployment configuration for GroqTales Backend
# This configuration sets up the backend API and SDK services on Render

services:
  # Main Backend API Service
  - type: web
    name: groqtales-backend-api
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build:backend
    startCommand: npm run start:backend
    healthCheckPath: /healthz
    ipAllowList:
      - source: 74.220.48.0/24
        description: "Allowed IP Range 1"
      - source: 74.220.56.0/24
        description: "Allowed IP Range 2"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "http://groqtales-backend-api:3001"
      - key: INTERNAL_API_URL
        value: "http://groqtales-backend-api:3001"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Alias keys — set these in the Render dashboard to the same values as the NEXT_PUBLIC_ variants above
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: REDIS_URL
        fromDatabase:
          name: groqtales-redis
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://groqtales.xyz
        value: https://comicraft.xyz
        value: https://groqtales.pages.dev
      - key: API_VERSION
        value: v1
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        value: "mock_google_id"
      - key: GOOGLE_CLIENT_SECRET
        value: "mock_google_secret"
      - key: GOOGLE_CALLBACK_URL
        value: "https://groqtales-backend-api.onrender.com/api/v1/auth/google/callback"
      # WalletConnect
      - key: NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID
        value: "mock_wallet_project_id"
      # NFTs & Signer
      - key: STORY_NFT_CONTRACT_ADDRESS
        value: "0x1234567890abcdef1234567890abcdef12345678"
      - key: CRAFTS_MARKETPLACE_ADDRESS
        value: "0xabcdef1234567890abcdef1234567890abcdef12"
      - key: CRAFTS_TOKEN_ADDRESS
        value: "0x7890abcdef1234567890abcdef1234567890abcd"
      - key: PLATFORM_SIGNER_KEY
        value: "mock_private_key"
      # Unsplash
      - key: NEXT_PUBLIC_UNSPLASH_API_KEY
        value: "mock_unsplash_key"
      # Email
      - key: SMTP_HOST
        value: "mock_smtp_host"
      - key: SMTP_USER
        value: "mock_smtp_user"
      - key: SMTP_PORT
        value: "587"
      - key: SENDGRID_API_KEY
        value: "mock_sendgrid_key"
      # IPFS
      - key: PINATA_JWT
        value: "mock_pinata_jwt"
      # TTS
      - key: SARVAM_API_KEY
        value: "mock_sarvam_key"

  # SDK Service (for future SDK implementations)
  - type: web
    name: groqtales-sdk-service
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build:sdk
    startCommand: npm run start:sdk
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3002
      - key: GROQ_API_KEY
        sync: false
      - key: SDK_VERSION
        value: v1.0.0
      - key: CORS_ORIGIN
        value: https://groqtales.xyz

  # Background Worker Service
  - type: worker
    name: groqtales-worker
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm run start:worker
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false

databases:
  # Redis for caching and session management
  - name: groqtales-redis
    databaseName: groqtales_cache
    user: groqtales_user
    region: oregon
    plan: free
